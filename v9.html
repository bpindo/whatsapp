<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hive Voter Auto Classifier</title>
<style>
body{font-family:system-ui;background:#f1f5f9;margin:0;padding:20px;}
.container{max-width:700px;margin:auto;background:white;padding:20px;border-radius:12px;box-shadow:0 4px 14px rgba(0,0,0,0.15);}
h1{text-align:center;color:#2563eb;margin-bottom:20px;}
.log{font-family:monospace;background:#111827;color:#d1d5db;padding:14px;border-radius:8px;height:420px;overflow:auto;font-size:13px;}
.ok{color:#22c55e;}
.warn{color:#f59e0b;}
.err{color:#ef4444;}
button{margin-top:15px;width:100%;padding:12px;border:none;border-radius:8px;background:#2563eb;color:white;font-weight:600;cursor:pointer;}
</style>
</head>
<body>

<div class="container">
<h1>Hive Voter Auto Classifier</h1>
<div class="log" id="log"></div>
<button onclick="start()">Start Scan & Update</button>
</div>

<script>
const API_VOTER = "https://script.google.com/macros/s/AKfycbzzPdLkT1PPda_r_RdTLYIWbiIIQ7hWvUc8-_s3FeF6xXV4rEX9mCQ_40xUU9YH6jCE/exec";

let voters = [];

function log(msg, cls=""){
  let el = document.getElementById("log");
  let div = document.createElement("div");
  div.className = cls;
  div.innerHTML = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

async function loadVoters(){
  log("Load voters database...");
  try{
    let res = await fetch(API_VOTER+"?api=list");
    let data = await res.json();
    voters = data.voters || [];
    log("Total akun: "+voters.length,"ok");
  }catch(e){
    log("Gagal load voters","err");
    console.error(e);
  }
}

async function cekVP(username){
  log(username+" sedang cek VP...");
  try{
    let res = await fetch("https://api.hive.blog",{
      method:"POST",
      body:JSON.stringify({
        jsonrpc:"2.0",
        method:"condenser_api.get_accounts",
        params:[[username]],
        id:1
      })
    });
    let j = await res.json();
    let acc = j.result[0];
    let vp = acc.voting_power;
    let last = new Date(acc.last_vote_time+"Z");
    let now = new Date();
    let seconds = (now-last)/1000;
    let regen = seconds*10000/432000;
    let current = Math.min(10000, vp+regen);
    let percent = current/100;
    return percent;
  }catch(e){
    log(username+" error cek VP","err");
    return null;
  }
}


async function start(){
  await loadVoters();

  for(let acc of voters){
    try{
      let vp = await cekVP(acc.username);
      if(vp === null) continue;
      let vpText = vp.toFixed(2)+"%";

      // VP >=96 -> aktif true, else false
      let newAktif = vp >= 96;

      log(acc.username+" VP "+vpText+" → "+(newAktif?"VOTER":"DISABLED"), newAktif?"ok":"warn");

      // Update properti aktif di array lokal
      acc.aktif = newAktif;

    }catch(e){
      log(acc.username+" error","err");
    }
  }

  // Kirim seluruh array voters ke GAS sekaligus
  try{
    let res = await fetch(API_VOTER,{
      method:"POST",
      body:JSON.stringify({
        api:"updateVoters",
        voters: voters
      })
    });
    let result = await res.json();
    log("Database diperbarui: "+result.message,"ok");
  }catch(e){
    log("Gagal update database","err");
  }

  log("Selesai scan semua akun","ok");
}

</script>

</body>
</html>
