<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Editor V1.4.1 - Preview</title>
<style>
html, body{margin:0;padding:0;height:100dvh;display:flex;flex-direction:column;font-family:system-ui;background:#0f172a;overflow:hidden;}
#editorWrap{flex:1; display:flex; overflow:hidden; border-bottom:1px solid #1f2937;}
#lineNumbers{background:#020617; color:#64748b; font-family:monospace; font-size:16px; line-height:1.6; padding:10px 6px 10px 8px; text-align:right; user-select:none; border-right:1px solid #1f2937; white-space:pre;}
#lineNumbers span.active{color:#38bdf8;}
#lineNumbers span.error{color:#ef4444; font-weight:bold;}
textarea{flex:1; background:#020617; color:#e2e8f0; font-family:monospace; font-size:16px; line-height:1.6; border:none; outline:none; padding:10px; resize:none; overflow:auto; caret-color:#38bdf8;}
textarea.active-line{background-image: linear-gradient(transparent calc(var(--line) * 1.6em), rgba(56,189,248,0.15) calc(var(--line) * 1.6em), rgba(56,189,248,0.15) calc((var(--line)+1) * 1.6em), transparent calc((var(--line)+1) * 1.6em)); background-repeat:no-repeat;}
.controls{display:flex; gap:6px; padding:6px; background:#020617;}
button, label{flex:1; padding:10px; border:none; border-radius:6px; background:#1e293b; color:#e2e8f0; font-size:14px;}
#exitFull{position:fixed; bottom:12px; right:12px; background:#1e293b; color:#fff; border:none; border-radius:8px; padding:10px 12px; font-size:14px; display:none; z-index:999;}
body.full #exitFull{display:block;}
#previewModal{display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;}
#previewModal .modalContent{position:relative; width:80%; height:80%; background:#fff; border-radius:8px; overflow:hidden; display:flex; flex-direction:column;}
#previewModal button.closeBtn{position:absolute; top:8px; right:8px; z-index:1001; padding:6px 10px; border:none; border-radius:4px; background:#1e293b; color:#fff; font-size:14px; cursor:pointer;}
#previewModal iframe{flex:1; border:none;}
</style>
</head>
<body>

<div id="editorWrap">
  <div id="lineNumbers"></div>
  <textarea id="code" placeholder="Tulis kode di sini..."></textarea>
</div>

<div class="controls">
  <button onclick="pasteCode()">📋 Paste</button>
  <button onclick="copyCode()">📄 Copy</button>
  <button onclick="clearCode()">🗑️ Clear</button>
  <button onclick="showPreview()">👁 Preview</button>
</div>

<!-- Modal Preview -->
<div id="previewModal">
  <div class="modalContent">
    <button class="closeBtn">❌ Close</button>
    <iframe id="previewFrame"></iframe>
  </div>
</div>

<button id="exitFull">⤡</button>

<script>
const STORAGE_KEY="editor_v1_code";
const code=document.getElementById("code");
const lines=document.getElementById("lineNumbers");
const toggle=document.getElementById("toggleLine");
const full=document.getElementById("fullMode");
const exitBtn=document.getElementById("exitFull");

// Preview elements
const previewModal = document.getElementById("previewModal");
const previewFrame = document.getElementById("previewFrame");
const closePreviewBtn = previewModal.querySelector(".closeBtn");

const voidTags=["area","base","br","col","embed","hr","img","input","link","meta","source","track","wbr"];

function validateHTML(text){
  const stack=[]; const errors=new Set();
  const rows=text.split("\n");
  rows.forEach((row,index)=>{
    const tags=row.match(/<\/?[^>]+>/g)||[];
    tags.forEach(tag=>{
      const isClose=tag.startsWith("</");
      const name=tag.replace(/<\/?|>/g,"").split(" ")[0].toLowerCase();
      if(voidTags.includes(name)) return;
      if(tag.endsWith("/>")) return;
      if(!isClose){stack.push({name,line:index});}else{
        if(stack.length===0 || stack[stack.length-1].name!==name){errors.add(index);}else{stack.pop();}
      }
    });
  });
  stack.forEach(item=>errors.add(item.line));
  return errors;
}

function getCurrentLine(){return code.value.substr(0, code.selectionStart).split("\n").length-1;}

const saved = localStorage.getItem(STORAGE_KEY);
if(saved){code.value=saved;}

function updateLines(){
  if(!toggle.checked){lines.style.display="none"; return;}
  lines.style.display="block";
  const rows=code.value.split("\n");
  const active=getCurrentLine();
  const errorLines=validateHTML(code.value);
  let html="";
  rows.forEach((_,i)=>{
    let cls="";
    if(i===active) cls+="active ";
    if(errorLines.has(i)) cls+="error";
    html+=`<span class="${cls}">${i+1}</span>\n`;
  });
  lines.innerHTML=html;
  lines.scrollTop=code.scrollTop;
  code.style.setProperty('--line',active);
  code.classList.add('active-line');
}

function run(){/* Optional live preview if needed */}

// Clipboard / Clear functions
async function pasteCode(){code.value=await navigator.clipboard.readText(); updateLines();}
async function copyCode(){if(!code.value.trim()){alert("Kosong");return;}await navigator.clipboard.writeText(code.value);}
function clearCode(){code.value=""; updateLines();}

// === Preview functions ===
function showPreview(){
  const blob=new Blob([code.value],{type:"text/html"});
  previewFrame.src=URL.createObjectURL(blob);
  previewModal.style.display="flex";
}

// Close Preview
closePreviewBtn.addEventListener("click", ()=>{
  previewModal.style.display="none";
  previewFrame.src = "";
});

// Initial setup
updateLines();
code.focus();
</script>
</body>
</html>
