<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hive Admin Panel</title>
<style>
body{font-family:Arial;padding:20px;background:#f4f4f5;}
.container{max-width:700px;margin:auto;background:white;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
h2,h3{margin-bottom:10px;}
input,textarea,select,button{width:100%;padding:10px;margin-top:8px;border-radius:5px;border:1px solid #ccc;box-sizing:border-box;}
button{background:#4CAF50;color:white;border:none;cursor:pointer;margin-top:10px;}
button.delete{background:#f44336;}
button.toggle{background:#2196F3;}
button.paste{background:#ff9800;color:white;}
.status{margin-top:10px;font-size:14px;color:#333;}
.tabs{display:flex;border-bottom:1px solid #ccc;margin-bottom:10px;}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;background:#e4e4e4;border-radius:5px 5px 0 0;margin-right:2px;}
.tab.active{background:#4CAF50;color:white;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111827;color:white;padding:10px 16px;border-radius:6px;opacity:0;transition:0.3s;}
.toast.show{opacity:1;}
input, textarea, select {
  font-size: 16px;
}

</style>
</head>
<body>
<div class="container">
<h2>Hive Admin Panel</h2>

<div class="tabs">
  <div class="tab active" onclick="showTab('voter')">Voter</div>
  <div class="tab" onclick="showTab('disable')">Disable</div>
  <div class="tab" onclick="showTab('link')">Link</div>
</div>

<!-- TAB VOTER -->
<div id="voter" class="tab-content active">
  <h3>Tambah Voter</h3>
  <input type="text" id="newUsername" placeholder="Username (lowercase)">
  <input type="text" id="newPostingKey" placeholder="Posting Key">
  <label>
    <input type="checkbox" id="newActive" checked> Aktif
  </label>
  <button onclick="addVoter()">Tambah</button>

  <h3>Database Voter</h3>
  <select id="voterDropdown"></select>
  <button class="delete" onclick="deleteVoter()">Hapus</button>
  <button class="toggle" onclick="toggleVoter()">Toggle Aktif/Nonaktif</button>
  <button style="background:#ff9800;color:white;" onclick="moveVoterToDisable()">Pindah ke Disable</button>

  <h3>Update Semua Voter (JSON)</h3>
  <textarea id="jsonVoters" rows="6" placeholder='[{"username":"user1","postingKey":"5K...","aktif":true}]'></textarea>
  <button class="paste" onclick="pasteToTextarea('jsonVoters')">Paste JSON</button>
  <button onclick="updateVoters()">Update</button>
</div>

<!-- TAB DISABLE -->
<div id="disable" class="tab-content">
  <h3>Database Disable (Legacy)</h3>
  <select id="disableDropdown"></select>
  <button class="delete" onclick="deleteDisable()">Hapus</button>
  <button onclick="moveDisableToVoter()">Pindah ke Voter</button>

  <h3>Update Semua Disable (JSON)</h3>
  <textarea id="jsonDisable" rows="6" placeholder='[{"username":"user1","postingKey":"5K..."}]'></textarea>
  <button class="paste" onclick="pasteToTextarea('jsonDisable')">Paste JSON</button>
  <button onclick="updateDisable()">Update</button>
</div>

<!-- TAB LINK -->
<div id="link" class="tab-content">
  <h3>Link Sekarang</h3>
  <div id="currentLink"></div>
  <h3>Update Link</h3>
  <input type="text" id="newLink" placeholder="Masukkan link baru">
  <button onclick="updateLink()">Update Link</button>
</div>

<div class="status" id="status">Memuat data...</div>
</div>

<div class="toast" id="toast"></div>

<script>
const apiUrl = "https://script.google.com/macros/s/AKfycbzzPdLkT1PPda_r_RdTLYIWbiIIQ7hWvUc8-_s3FeF6xXV4rEX9mCQ_40xUU9YH6jCE/exec";
let voters = [], disables = [], link = "";

// Toast helper
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

// Tabs
function showTab(tabId){
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
}

// Paste JSON ke textarea
async function pasteToTextarea(id){
  try{
    const text = await navigator.clipboard.readText();
    document.getElementById(id).value = text.trim();
    toast("JSON berhasil dipaste");
  }catch{
    toast("Clipboard ditolak");
  }
}

// Load Data
function loadData(){
  fetch(apiUrl+"?api=list")
  .then(res=>res.json())
  .then(data=>{
    voters = data.voters || [];
    disables = data.disable || [];
    link = data.link || "";
    refreshVoter();
    refreshDisable();
    document.getElementById("currentLink").innerText = link;
    document.getElementById("jsonVoters").value = JSON.stringify(voters,null,2);
    document.getElementById("jsonDisable").value = JSON.stringify(disables,null,2);
    document.getElementById("status").innerText = "Data siap.";
  });
}

// Voter Functions
function refreshVoter(){
  const sel = document.getElementById("voterDropdown");
  sel.innerHTML = "";
  voters.forEach(v=>{
    const opt = document.createElement("option");
    opt.value = v.username;
    opt.innerText = v.username + " (" + (v.aktif ? "Aktif" : "Nonaktif") + ")";
    sel.appendChild(opt);
  });
}

function addVoter(){
  const username = document.getElementById("newUsername").value.trim().toLowerCase();
  const postingKey = document.getElementById("newPostingKey").value.trim();
  const aktif = document.getElementById("newActive").checked;
  if(!username || !postingKey){ toast("Isi username & posting key"); return; }
  fetch(apiUrl,{method:'POST',body: JSON.stringify({api:'addVoter', username, postingKey, aktif})})
  .then(res=>res.json()).then(res=>{
    toast(res.message);
    loadData();
    document.getElementById("newUsername").value="";
    document.getElementById("newPostingKey").value="";
  });
}

function deleteVoter(){
  const username = document.getElementById("voterDropdown").value;
  if(!username) return toast("Pilih voter");
  fetch(apiUrl,{method:'POST',body: JSON.stringify({api:'deleteVoter', username})})
  .then(res=>res.json()).then(res=>{
    toast(res.message);
    loadData();
  });
}

function toggleVoter(){
  const username = document.getElementById("voterDropdown").value;
  if(!username) return toast("Pilih voter");
  fetch(apiUrl,{method:'POST',body: JSON.stringify({api:'toggleVoter', username})})
  .then(res=>res.json()).then(res=>{
    toast(res.message);
    loadData();
  });
}

function updateVoters(){
  let arr;
  try{ arr = JSON.parse(document.getElementById("jsonVoters").value); if(!Array.isArray(arr)) throw "Bukan array"; }
  catch(e){ toast("Format JSON salah!"); return; }
  fetch(apiUrl,{method:'POST',body: JSON.stringify({api:'updateVoters', voters: arr})})
  .then(res=>res.json()).then(res=>{
    toast(res.message);
    loadData();
  });
}

// Disable Functions
function refreshDisable(){
  const sel = document.getElementById("disableDropdown");
  sel.innerHTML = "";
  disables.forEach(u=>{
    const opt = document.createElement("option");
    opt.value = u.username;
    opt.innerText = u.username;
    sel.appendChild(opt);
  });
}

function deleteDisable(){
  const username = document.getElementById("disableDropdown").value;
  if(!username) return toast("Pilih username"); 
  fetch(apiUrl,{method:'POST',body: JSON.stringify({api:'deleteDisable', username})})
  .then(res=>res.json()).then(res=>{
    toast(res.message);
    loadData();
  });
}

function updateDisable(){
  let arr;
  try{ arr = JSON.parse(document.getElementById("jsonDisable").value); if(!Array.isArray(arr)) throw "Bukan array"; }
  catch(e){ toast("Format JSON salah!"); return; }
  fetch(apiUrl,{method:'POST',body: JSON.stringify({api:'updateDisable', disable: arr})})
  .then(res=>res.json()).then(res=>{
    toast(res.message);
    loadData();
  });
}

// Move Functions
function moveDisableToVoter(){
  const username = document.getElementById("disableDropdown").value;
  if(!username) return toast("Pilih username");

  let disableObj = disables.find(d => d.username === username);
  if(!disableObj) return toast("Data disable tidak ditemukan");

  fetch(apiUrl, {method: 'POST', body: JSON.stringify({api: 'addVoter', username: disableObj.username, postingKey: disableObj.postingKey})})
  .then(res => res.json())
  .then(res => {
    toast(res.message);
    if(res.status === "success"){
      fetch(apiUrl, {method: 'POST', body: JSON.stringify({api: 'deleteDisable', username: disableObj.username})})
      .then(()=>loadData());
    }
  });
}

function moveVoterToDisable(){
  const username = document.getElementById("voterDropdown").value;
  if(!username) return toast("Pilih voter");

  let voterObj = voters.find(v => v.username === username);
  if(!voterObj) return toast("Voter tidak ditemukan");

  fetch(apiUrl, {method: 'POST', body: JSON.stringify({api: 'addDisable', username: voterObj.username, postingKey: voterObj.postingKey})})
  .then(res => res.json())
  .then(res => {
    toast(res.message);
    if(res.status === "success"){
      fetch(apiUrl, {method: 'POST', body: JSON.stringify({api: 'deleteVoter', username: voterObj.username})})
      .then(()=>loadData());
    }
  });
}

// LINK
function updateLink(){
  const newLink = document.getElementById("newLink").value.trim();
  if(!newLink) return toast("Isi link baru");
  fetch(apiUrl,{method:'POST',body: JSON.stringify({api:'setLink', link: newLink})})
  .then(res=>res.json()).then(res=>{
    toast("Link diperbarui");
    loadData();
    document.getElementById("newLink").value="";
  });
}

// Init
window.onload = loadData;
</script>
</body>
</html>
